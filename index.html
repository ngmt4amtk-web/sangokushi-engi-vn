<style>
  :root{ --black:#0E0B0A; --gold:#B8923C; --crimson:#9E2B25; --crimson2:#C8413B;
    --silk:#E8DCC0; --ivory:#C9BFA8; --jade:#3E8E7E; --fs:1; }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; background:#000; overflow:hidden;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif; color:var(--silk);}
  #app{position:relative; width:100vw; height:100vh; height:100dvh; overflow:hidden; background:#000;}
  #bg{position:absolute; inset:0; z-index:1; background:#000; background-size:cover; background-position:center; transition:opacity .5s ease;}
  #bgtint{position:absolute; inset:0; z-index:2; pointer-events:none; transition:background .8s ease;}
  #bgcap{position:absolute; top:14px; left:16px; z-index:5; font-size:12px; letter-spacing:.15em;
    color:rgba(232,220,192,.45); text-shadow:0 1px 4px #000;}
  #stage{position:absolute; inset:0; z-index:3; pointer-events:none; overflow:hidden;}
  #cg{position:absolute; inset:0; z-index:4; opacity:0; pointer-events:none; background:#000; background-size:cover; background-position:center; transition:opacity .55s ease;}
  #cg.on{opacity:1;}
  .sprite{position:absolute; bottom:0; left:50%; opacity:0; will-change:transform,opacity,filter;
    transform:translateX(-50%) translateY(16px);
    transition:opacity .45s ease, transform .45s ease, filter .35s ease, height .4s ease, left .45s ease;
    filter:drop-shadow(0 12px 22px rgba(0,0,0,.5));}
  .sprite img{height:100%; width:auto; display:block; transform-origin:bottom center; transition:transform .35s ease;}
  .sprite.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .sprite.dim{filter:brightness(.45) saturate(.82) drop-shadow(0 12px 22px rgba(0,0,0,.55));}
  .sprite.dim img{transform:scale(.94);}
  .sprite.spot img{transform:scale(1);}
  #fx{position:absolute; inset:0; z-index:6; pointer-events:none; opacity:0;}
  #fx.flash{background:#fff; animation:flash .45s ease;}
  @keyframes flash{0%{opacity:0;}20%{opacity:.9;}100%{opacity:0;}}
  #veil{position:absolute; inset:0; z-index:6; background:#000; opacity:0; pointer-events:none; transition:opacity .6s ease;}
  #win{position:absolute; left:50%; transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom,0px) + 18px);
    width:min(92%,900px); z-index:8;
    height:184px; height:clamp(184px,27dvh,244px); padding:14px 20px 28px;
    background:linear-gradient(180deg, rgba(13,9,7,.90), rgba(7,5,4,.975));
    border:1px solid rgba(184,146,60,.32); border-radius:14px;

    cursor:pointer; display:flex; flex-direction:column; overflow:hidden;}
  #name{align-self:flex-start; display:inline-block; font-size:clamp(15px,2.3vw,20px); font-weight:bold;
    padding:5px 18px; margin-bottom:10px; border-radius:5px; color:#fff; letter-spacing:.10em; min-height:8px;
    box-shadow:0 2px 8px rgba(0,0,0,.45); text-shadow:0 1px 2px rgba(0,0,0,.5); border-top:1px solid rgba(255,255,255,.18);}
  #text{font-size:calc(clamp(16px,2.5vw,20px) * var(--fs)); line-height:1.78; color:var(--silk); text-shadow:0 1px 3px #000;

  #next{position:absolute; right:16px; bottom:6px; z-index:9; color:var(--gold); font-size:13px; opacity:.6; pointer-events:none; display:none; animation:nextpulse 1.3s ease-in-out infinite;}

  .overlay{position:absolute; inset:0; z-index:11; display:none; align-items:center; justify-content:center;

  .overlay.on{display:flex;}
  .ovpanel{width:min(560px,95%); max-height:100%; display:flex; flex-direction:column;

    box-shadow:0 16px 50px rgba(0,0,0,.7);}
  .ovhead{padding:15px 20px; font-size:15px; font-weight:bold; letter-spacing:.25em; color:var(--gold);

  #logbody{overflow-y:auto; -webkit-overflow-scrolling:touch; padding:4px 20px 16px;}
  .logrow{padding:11px 0; border-bottom:1px solid rgba(184,146,60,.1); font-size:14px; line-height:1.7;}

</style>

<!-- scenes は回ごとに動的ロード（ハブから） -->
<script>
const MOOD = {
  warm:'linear-gradient(160deg,#2a120c,#150a08 60%,#070403)',
  cool:'linear-gradient(160deg,#0c1320,#0a0e16 60%,#05070c)',
  night:'linear-gradient(160deg,#10101a,#08080c 70%,#000)',
  dawn:'linear-gradient(160deg,#2a2018,#181410 60%,#0a0806)',
  dusk:'linear-gradient(160deg,#2a1a12,#181009 60%,#0a0604)',
  storm:'linear-gradient(160deg,#1a1d24,#0e1014 65%,#05060a)',
  default:'linear-gradient(160deg,#1a1008,#0a0604)'
};
const VIGNETTE='linear-gradient(180deg, rgba(6,4,3,.30) 0%, rgba(6,4,3,0) 20%, rgba(6,4,3,0) 46%, rgba(6,4,3,.5) 80%, rgba(6,4,3,.88) 100%)';
const TINT={ warm:'rgba(48,20,8,.22)', cool:'rgba(10,16,32,.30)', night:'rgba(8,10,30,.34)',
  dawn:'rgba(46,30,16,.18)', dusk:'rgba(40,24,12,.20)', storm:'rgba(20,26,36,.34)', default:'rgba(20,12,8,.20)' };
// 背景・CGは bg_key / cg_key を assets/ から直接ロード（一本道VN用に簡素化）
function showCg(cg){ if(!cg) return; const el=E('cg'); el.style.background=VIGNETTE+", url('assets/cg/"+cg+".jpg') center/cover"; el.classList.add('on'); }
function hideCg(){ const el=E('cg'); if(el) el.classList.remove('on'); }
function setBg(bgKey, mood){
  hideCg();
  const bg=E('bg'), tint=E('bgtint');
  if(bgKey){
    // bg画像を mood色グラデの上に重ねる＝画像が未生成(404)でも濃いグラデが見える、在れば画像が乗る
    const grad=MOOD[mood]||MOOD.default;
    bg.style.backgroundColor='#000';
    bg.style.backgroundImage="url('assets/bg/"+bgKey+".jpg'), "+grad;
    bg.style.backgroundSize='cover, cover'; bg.style.backgroundPosition='center, center';
    const t=TINT[mood]||TINT.default;
    tint.style.background=VIGNETTE+', linear-gradient(0deg,'+t+','+t+')';
  } else {
    bg.style.backgroundImage='none'; bg.style.background=MOOD[mood]||MOOD.default;
    tint.style.background='none';
  }
}
// 名前タブの配色（関羽＝翡翠、敵味方を色で）
// 名前タブ＝識別の主役。ロスターは陣営色、非ロスターは名前ハッシュで一意色（似た名前/同じモブ顔でもタブ色で判別）
let FACTION={};  // faction.json から
const FAC_COLOR={
  '蜀':'linear-gradient(180deg,#3a8f6a,#1c5039)','魏':'linear-gradient(180deg,#3a6aa0,#1b3a5e)',
  '呉':'linear-gradient(180deg,#b04a40,#6a241f)','晋':'linear-gradient(180deg,#6a4a8e,#3a2450)',
  '漢':'linear-gradient(180deg,#b89540,#665018)','群雄':'linear-gradient(180deg,#856448,#473322)',
  '異':'linear-gradient(180deg,#b06a34,#663a18)'
};
const FAC_TAG={'蜀':'蜀','魏':'魏','呉':'呉','晋':'晋','漢':'漢','群雄':'','異':'蛮'};
const MINOR_PAL=['#3a6b6b','#46587e','#6b5a36','#7c3a48','#3a5e48','#5a3a6e','#6a4a38','#3a486e','#5c5a36','#724a4a','#3a6a5c','#565060','#5a4a6e','#496a44'];
function tabBg(name){
  const f=FACTION[name]; if(f&&FAC_COLOR[f]) return FAC_COLOR[f];
  let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))>>>0;
  const c=MINOR_PAL[h%MINOR_PAL.length]; return 'linear-gradient(180deg,'+c+','+c+'cc)';
}
let NAME2CHAR={};  // roster.json から init で投入（名→立ち絵base key の char部）

const E = id=>document.getElementById(id);
let SCENES = {};
let SCENE_ORDER = [];
let curEp = 0;        // 現在の回番号
let MANIFEST = [];    // 全120回の目次
let node, nodeId, idx, currentSpeaker;
let stage=[]; const stageEls={}; let lastSpriteChar=null;
let auto=false, skip=false, skipTimer=null, autoTimer=null, hideUI=false, revealing=false, finishReveal=null, typeIv=null, history=[];
let pages=[], pageIdx=0, curPrefix='', curText=null;
const SPEEDS=[{n:'瞬間',ms:0},{n:'速',ms:14},{n:'中',ms:28},{n:'遅',ms:48}]; let speedIdx=0;
const FONTS=[{n:'小',v:0.9},{n:'標準',v:1.0},{n:'大',v:1.15},{n:'特大',v:1.32}];

// ── セーブ/設定/進捗（localStorage・一本道VNなのでオートセーブ＋続きから＋読了管理） ──
const BUILD='20260622';                 // キャッシュ版数（更新時に上げる）
const SKEY='sangokushi_engi_vn_v1';
let SAVE={resume:null, settings:{speedIdx:0, fontScale:1}, progress:{}};
function loadSave(){ try{ const j=JSON.parse(localStorage.getItem(SKEY)||'null');
  if(j&&typeof j==='object'){ SAVE.resume=j.resume||null;
    SAVE.settings=Object.assign({speedIdx:0,fontScale:1}, j.settings||{});
    SAVE.progress=j.progress||{}; } }catch(e){} }
function flushSave(){ try{ localStorage.setItem(SKEY, JSON.stringify(SAVE)); }catch(e){} }
function persistPos(){ if(!node||!curEp) return;
  SAVE.resume={ep:curEp, node:nodeId, idx:idx, pageIdx:pageIdx, ts:Date.now()}; flushSave(); }
function markProgress(n,st){ if(!n) return; if(SAVE.progress[n]==='done'&&st!=='done') return;
  SAVE.progress[n]=st; flushSave(); }
function doneCount(){ return Object.keys(SAVE.progress).filter(k=>SAVE.progress[k]==='done').length; }
function fontIdx(){ const v=(SAVE.settings.fontScale||1); const i=FONTS.findIndex(f=>Math.abs(f.v-v)<0.001); return i<0?1:i; }
function setFontScale(v,save){ document.documentElement.style.setProperty('--fs',v);
  SAVE.settings.fontScale=v; const mi=E('m-font'); if(mi) mi.textContent='文字サイズ：'+FONTS[fontIdx()].n;
  if(save!==false){ flushSave(); } if(curText!=null) refit(); }
function applySettings(){ speedIdx=SAVE.settings.speedIdx||0;
  const ms=E('m-speed'); if(ms) ms.textContent='文字速度：'+SPEEDS[speedIdx].n;
  setFontScale(SAVE.settings.fontScale||1,false); }
function refreshContinue(){ const c=E('continuebtn'); if(!c) return;
  if(SAVE.resume&&SAVE.resume.ep){ c.style.display='block'; c.textContent='続きから（第'+SAVE.resume.ep+'回）'; }
  else c.style.display='none'; }
let _toastT; function toast(msg){ const t=E('toast'); if(!t) return; t.textContent=msg; t.classList.add('on');
  clearTimeout(_toastT); _toastT=setTimeout(()=>t.classList.remove('on'),2600); }

function start(){
  clearStage(); currentSpeaker=null;
  setAuto(false); setSkip(false); setHideUI(false);
  if(autoTimer){clearTimeout(autoTimer); autoTimer=null;} clearInterval(typeIv); revealing=false;
  pages=[]; pageIdx=0; curText=null; history=[]; E('hud').classList.add('on');
  E('menu').classList.remove('on'); E('log').classList.remove('on'); E('hub').classList.remove('on');
  E('title').style.display='none'; E('endcard').style.display='none'; hideCg();
  go(SCENE_ORDER[0]);
}
function go(id){
  if(!SCENES[id]){ console.warn('missing node',id); return finale(); }
  clearStage();
  nodeId=id; node=SCENES[id]; idx=0; render();
}
function nextNode(){
  const i=SCENE_ORDER.indexOf(nodeId);
  if(i>=0 && i<SCENE_ORDER.length-1){ return go(SCENE_ORDER[i+1]); }
  return finale();
}
function render(){
  if(idx>=node.length){ return nextNode(); }
  const s=node[idx];
  if(s.t==='bg'){ setBg(s.bg, s.mood); E('bgcap').textContent=''; clearStage(); idx++; return render(); }
  if(s.t==='sprite'){ showSprite(s.key); idx++; return render(); }
  if(s.t==='cg'){ showCg(s.cg); idx++; return render(); }
  if(s.t==='hide'){ clearStage(); idx++; return render(); }
  if(s.t==='fx'){ doFx(s.fx); idx++; return render(); }
  if(s.t==='say'){ say(s.name||'', s.text||''); return; }
  if(s.t==='narrate'){ narrate(s.text||''); return; }
  idx++; return render();
}
function advance(){
  if(hideUI){ setHideUI(false); return; }
  if(E('menu').classList.contains('on')||E('log').classList.contains('on')||E('hub').classList.contains('on')) return;
  if(E('title').style.display!=='none') return;
  if(E('endcard').style.display==='flex') return;
  if(!node) return;
  // 本文をなぞって選択中はタップで送らない（誤送り防止）
  const sel=window.getSelection&&window.getSelection();
  if(sel && !sel.isCollapsed && String(sel).length>0 && E('win').contains(sel.anchorNode)) return;
  if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; }
  if(revealing){ if(finishReveal) finishReveal(); return; }
  if(pageIdx < pages.length-1){ pageIdx++; typeLine(curPrefix, pages[pageIdx]); return; }
  idx++; render();
}
function say(name,text){
  const n=E('name'); const fac=FACTION[name]; const tag=(fac&&FAC_TAG[fac])?FAC_TAG[fac]:'';
  n.innerHTML=(tag?'<span class="factag">'+esc(tag)+'</span>':'')+esc(name);
  n.style.background=tabBg(name); n.style.color='#fff'; n.style.visibility='visible';
  E('text').classList.remove('narrate');
  history.push({name:name,text:text,nr:false});
  startLine('', text);
  currentSpeaker=NAME2CHAR[name]||lastSpriteChar||null; applySpotlight();
}
function narrate(text){
  E('name').style.visibility='hidden';
  E('text').classList.add('narrate');
  history.push({name:'',text:text,nr:true});
  startLine('', text);
  currentSpeaker=null; applySpotlight();
}
function formatLine(text){
  return (text||'')
    .replace(/([。！？!?]+[」』）)\]］】]*)/g,'$1\n')
    .replace(/[ 　]*\n[ 　]*/g,'\n')
    .replace(/\n{2,}/g,'\n').replace(/\n+$/,'')
    .replace(/([一-鿿々〆ヶ])(?=[一-鿿々〆ヶ])/g,'$1⁠');
}
function paginate(formatted, prefix){
  const t=E('text');
  const fit=(s)=>{ t.innerHTML=prefix; const sp=document.createElement('span'); sp.textContent=s; t.appendChild(sp); return t.scrollHeight<=t.clientHeight+1; };
  const out=[]; let rest=formatted, guard=0;
  while(rest.length && guard++<60){
    if(fit(rest)){ out.push(rest); rest=''; break; }
    let lo=1, hi=rest.length, best=1;
    while(lo<=hi){ const mid=(lo+hi)>>1; if(fit(rest.slice(0,mid))){ best=mid; lo=mid+1; } else hi=mid-1; }
    const head=rest.slice(0,best);
    const nl=head.lastIndexOf('\n');
    let cut;
    if(nl>0){ cut=nl+1; }
    else { const lb=Math.max(head.lastIndexOf('。'),head.lastIndexOf('！'),head.lastIndexOf('？'),head.lastIndexOf('、'));
           cut=(lb>=best*0.4)?lb+1:best; }
    out.push(rest.slice(0,cut).replace(/^\n+|\n+$/g,''));
    rest=rest.slice(cut).replace(/^[\n 　]+/,'');
  }
  t.innerHTML='';
  return out.length?out:[''];
}
function bracketPages(pgs){
  const out=[]; let carry=0;
  for(let pg of pgs){
    let s='（'.repeat(carry)+pg, depth=0;
    for(const ch of s){ if(ch==='（') depth++; else if(ch==='）'){ depth--; if(depth<0) depth=0; } }
    if(depth>0) s=s+'）'.repeat(depth);
    carry=depth; out.push(s);
  }
  return out;
}
function startLine(prefix, text){
  curPrefix=prefix; curText=text; pages=bracketPages(paginate(formatLine(text), prefix)); pageIdx=0;
  typeLine(curPrefix, pages[0]);
}
function refit(){
  renderStage();
  if(curText!=null && node && E('title').style.display==='none' && E('endcard').style.display!=='flex'){
    const keep=pageIdx;
    pages=bracketPages(paginate(formatLine(curText), curPrefix)); pageIdx=Math.min(keep,pages.length-1);
    const t=E('text'); t.innerHTML=curPrefix; const sp=document.createElement('span'); sp.textContent=pages[pageIdx]; t.appendChild(sp);
    revealing=false; E('next').textContent=(pageIdx<pages.length-1)?'▽':'▼'; E('next').style.display='inline';
  }
}
function typeLine(prefix, text){
  const t=E('text');
  if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; }
  clearInterval(typeIv);
  t.innerHTML=prefix;
  const span=document.createElement('span'); t.appendChild(span);
  E('next').style.display='none';
  revealing=true;
  let i=0; const ms=skip?0:SPEEDS[speedIdx].ms;
  const finish=()=>{ clearInterval(typeIv); span.textContent=text; revealing=false;
    E('next').textContent=(pageIdx<pages.length-1)?'▽':'▼'; E('next').style.display='inline'; onLineDone(); };
  finishReveal=finish;
  if(ms<=0){ finish(); return; }
  typeIv=setInterval(()=>{ i++; span.textContent=text.slice(0,i); if(i>=text.length) finish(); }, ms);
}
function onLineDone(){
  persistPos();
  const sr=E('sr'); if(sr){ const last=history[history.length-1]||{}; sr.textContent=(last.name?last.name+'、':'')+((pages[pageIdx]||'').replace(/⁠/g,'')); }
  if(skip) return;
  if(auto){ const len=(E('text').textContent||'').length; autoTimer=setTimeout(advance, 700+len*42); }
}
function setAuto(on){ auto=on; E('b-auto').classList.toggle('active',on);
  if(!on && autoTimer){ clearTimeout(autoTimer); autoTimer=null; }
  if(on && !revealing && node) onLineDone();
}
function setSkip(on){ skip=on; E('b-skip').classList.toggle('active',on);
  if(skipTimer){ clearInterval(skipTimer); skipTimer=null; }
  if(on){ skipTimer=setInterval(()=>{
    if(E('menu').classList.contains('on')||E('log').classList.contains('on')||
       E('title').style.display!=='none'||E('endcard').style.display==='flex'){ setSkip(false); return; }
    advance();
  }, 95); }
}
function setHideUI(on){ hideUI=on; E('app').classList.toggle('hideui',on); }
function openLog(){
  const b=E('logbody'); b.innerHTML='';
  history.slice(-300).forEach(h=>{ const r=document.createElement('div'); r.className='logrow'+(h.nr?' nr':'');
    r.innerHTML=(h.name?'<span class="ln">'+esc(h.name)+'</span>':'')+'<span class="lt">'+esc(h.text)+'</span>'; b.appendChild(r); });
  E('log').classList.add('on'); requestAnimationFrame(()=>{ b.scrollTop=b.scrollHeight; });
}
const LAYOUT_P={1:{x:[50],h:80},2:{x:[22,78],h:80},3:{x:[15,50,85],h:80}};
function curLayout(){ return LAYOUT_P; }
const STAGE_CAP=3;
function charKey(k){ if(!k) return null; k=String(k); return k.startsWith('mob_')? k : k.split('_')[0]; }
function ensureEl(ch){
  let el=stageEls[ch];
  if(!el){
    E('stage').querySelectorAll('.sprite[data-char="'+ch+'"]').forEach(o=>{ if(o.parentNode) o.parentNode.removeChild(o); });
    el=document.createElement('div'); el.className='sprite'; el.dataset.char=ch;
    const im=document.createElement('img'); im.alt=''; el.appendChild(im); E('stage').appendChild(el); stageEls[ch]=el; }
  return el;
}
function removeEl(ch){ const el=stageEls[ch]; if(!el) return; el.classList.remove('show');
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); },450); delete stageEls[ch]; }
function clearStage(){ Object.keys(stageEls).forEach(removeEl); stage=[]; }
function showSprite(key){
  const ch=charKey(key); if(!ch) return;
  lastSpriteChar=ch;
  const item=stage.find(s=>s.char===ch);
  if(item){ item.key=key; }
  else{
    if(stage.length>=STAGE_CAP){
      let i=stage.findIndex(s=>s.char!==currentSpeaker); if(i<0) i=0;
      removeEl(stage.splice(i,1)[0].char);
    }
    stage.push({char:ch,key});
  }
  renderStage();
}
function renderStage(){
  const LL=curLayout();
  const n=Math.min(stage.length,STAGE_CAP); const L=LL[n]||LL[STAGE_CAP];
  stage.forEach((s,i)=>{
    const el=ensureEl(s.char); const img=el.querySelector('img');
    const src='assets/sprites/'+s.key+'.png';
    if(img.getAttribute('src')!==src){ img.src=src; }
    el.style.left=L.x[i]+'%'; el.style.height=L.h+'%'; el.style.bottom=(L.b!=null?L.b:0)+'%';
    requestAnimationFrame(()=>el.classList.add('show'));
  });
  applySpotlight();
}
function applySpotlight(){
  const lit = currentSpeaker && stage.some(s=>s.char===currentSpeaker);
  stage.forEach(s=>{
    const el=stageEls[s.char]; if(!el) return;
    if(!lit){ el.classList.remove('dim','spot'); el.style.zIndex=4; }
    else if(s.char===currentSpeaker){ el.classList.add('spot'); el.classList.remove('dim'); el.style.zIndex=6; }
    else{ el.classList.add('dim'); el.classList.remove('spot'); el.style.zIndex=3; }
  });
}
function doFx(fx){
  const el=E('fx');
  if(fx==='blackout'||fx==='fade'){ const v=E('veil'); v.style.opacity= fx==='blackout'?'1':'.6'; setTimeout(()=>v.style.opacity='0',700); return; }
  el.className=''; void el.offsetWidth; el.classList.add('flash');
}
function finale(){
  setAuto(false); setSkip(false); hideCg(); E('hud').classList.remove('on');
  markProgress(curEp,'done');
  // 読了したら「続きから」は次の回の頭に進める（最終回なら消す）
  SAVE.resume = (curEp>=120) ? null : {ep:curEp+1, node:null, idx:0, pageIdx:0, ts:Date.now()};
  flushSave(); refreshContinue();
  const m=MANIFEST[curEp-1]||{};
  let nav=E('endnav'); if(!nav){ nav=document.createElement('div'); nav.id='endnav'; nav.style.marginTop='18px'; E('endcard').insertBefore(nav,E('restartbtn')); }
  nav.innerHTML='';
  if(curEp>=120){
    E('endtitle').textContent='全 一二〇 回 読 破';
    E('endname').textContent='三國演義 ─ 読み物版';
    E('endbody').innerHTML='天下の大勢、分かれて久しければ必ず合し、合して久しければ必ず分かる。<br>'
      +'桃園に結びし義より、三分の天下が一統に帰すまで――百二十回を、読み通された。<br><br>'
      +'<span style="color:#C9A24B;letter-spacing:.2em;">読了 '+doneCount()+' / 120 回</span>'
      +'<br><br><span style="font-size:11px;color:rgba(232,220,192,.5);line-height:1.7;">原典：羅貫中『三國演義』（パブリックドメイン）<br>現代語訳・構成・実装　長又允希</span>';
  } else {
    E('endtitle').textContent='第'+curEp+'回 了';
    E('endname').textContent='';
    E('endbody').textContent=(m.title||'');
    const b=document.createElement('div'); b.className='btn'; b.textContent='次の回（第'+(curEp+1)+'回）へ';
    b.setAttribute('role','button'); b.tabIndex=0;
    b.onclick=(e)=>{e.stopPropagation(); E('endcard').style.display='none'; loadEpisode(curEp+1);}; nav.appendChild(b);
  }
  const b2=document.createElement('div'); b2.className='btn alt'; b2.textContent='目次へ戻る';
  b2.setAttribute('role','button'); b2.tabIndex=0;
  b2.onclick=(e)=>{e.stopPropagation(); E('endcard').style.display='none'; openHub();}; nav.appendChild(b2);
  E('endcard').style.display='flex';
}

const ARCS=[[1,33,'群雄割拠 ― 黄巾〜官渡'],[34,50,'荊州と赤壁'],[51,85,'天下三分 ― 益州〜夷陵'],[86,104,'諸葛亮の北伐'],[105,120,'三国の終焉〜天下統一']];
function openHub(){
  E('title').style.display='none'; E('endcard').style.display='none'; E('hud').classList.remove('on');
  if(node){ node=null; } SCENES={}; SCENE_ORDER=[];
  E('hub').classList.add('on');
}
function buildHub(){
  const list=E('hublist'); list.innerHTML='';
  for(const [a,b,name] of ARCS){
    const h=document.createElement('div'); h.className='archead'; h.textContent=name; list.appendChild(h);
    for(let n=a;n<=b;n++){
      const m=MANIFEST[n-1]||{title:''};
      const st=SAVE.progress[n];
      const mark = st==='done' ? '<span class="epmark done">✓ 読了</span>'
                 : st==='reading' ? '<span class="epmark reading">読書中</span>' : '';
      const ttl=(m.title||'').replace(/^第[一二三四五六七八九十百〇○]+回[　 ]*/,'');
      const row=document.createElement('div'); row.className='eprow'+(st==='done'?' done':'');
      row.setAttribute('role','button'); row.tabIndex=0;
      row.setAttribute('aria-label','第'+n+'回 '+ttl+(st==='done'?'（読了済）':st==='reading'?'（読書中）':''));
      row.innerHTML='<span class="epn">第'+n+'回</span><span class="ept">'+esc(ttl)+'</span>'+mark;
      row.onclick=(e)=>{ e.stopPropagation(); E('hub').classList.remove('on'); loadEpisode(n); };
      list.appendChild(row);
    }
  }
  const hp=E('hubprog'); if(hp) hp.textContent='読了 '+doneCount()+' / 120';
}
function loadEpisode(n, resumePos){
  curEp=n; try{ window.history.replaceState(null,'','#ep='+n); }catch(e){}
  markProgress(n,'reading'); refreshContinue();
  const old=document.getElementById('epscript'); if(old) old.remove();
  const s=document.createElement('script'); s.id='epscript';
  s.src='scenes/scenes_'+String(n).padStart(3,'0')+'.js?v='+BUILD;
  s.onload=()=>{ SCENES=window.SCENES||{}; SCENE_ORDER=(window.SCENE_ORDER&&window.SCENE_ORDER.length)?window.SCENE_ORDER:Object.keys(SCENES);
    // この回のアセット先読み
    const seen=new Set();
    for(const k in SCENES) for(const bt of SCENES[k]){ if(bt.t==='sprite'&&bt.key&&!seen.has(bt.key)){seen.add(bt.key); const i=new Image(); i.src='assets/sprites/'+bt.key+'.png';} if(bt.t==='bg'&&bt.bg){const i=new Image(); i.src='assets/bg/'+bt.bg+'.jpg';} }
    if(resumePos && resumePos.node && SCENES[resumePos.node]) doResume(resumePos); else start(); };
  s.onerror=()=>{ toast('第'+n+'回の読み込みに失敗しました。通信状況をご確認ください。'); openHub(); };
  document.body.appendChild(s);
}
// 保存位置へ復帰：幕頭からセットアップ（背景/立ち絵）だけ早送り再生し、保存ビート＝ページへ着地
function doResume(pos){
  clearStage(); currentSpeaker=null; setAuto(false); setSkip(false); setHideUI(false);
  if(autoTimer){clearTimeout(autoTimer); autoTimer=null;} clearInterval(typeIv); revealing=false;
  pages=[]; pageIdx=0; curText=null; history=[]; E('hud').classList.add('on');
  E('menu').classList.remove('on'); E('log').classList.remove('on'); E('hub').classList.remove('on');
  E('title').style.display='none'; E('endcard').style.display='none'; hideCg();
  nodeId=pos.node; node=SCENES[nodeId];
  if(!node){ return start(); }
  const target=Math.min(Math.max(0,pos.idx|0), node.length-1);
  for(let k=0;k<target;k++){ const s=node[k]; if(!s) continue;
    if(s.t==='bg') setBg(s.bg,s.mood);
    else if(s.t==='sprite') showSprite(s.key);
    else if(s.t==='cg') showCg(s.cg);
    else if(s.t==='hide') clearStage();
    // fx は復帰時に再生しない（点滅回避）
  }
  idx=target; render();
  if(pos.pageIdx>0 && pages.length>1){
    pageIdx=Math.min(pos.pageIdx|0, pages.length-1);
    const t=E('text'); t.innerHTML=curPrefix; const sp=document.createElement('span'); sp.textContent=pages[pageIdx]; t.appendChild(sp);
    revealing=false; E('next').textContent=(pageIdx<pages.length-1)?'▽':'▼'; E('next').style.display='inline';
  }
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

E('b-menu').onclick=e=>{ e.stopPropagation(); E('menu').classList.add('on'); };
E('log-close').onclick=e=>{ e.stopPropagation(); E('log').classList.remove('on'); };
E('menu-close').onclick=e=>{ e.stopPropagation(); E('menu').classList.remove('on'); };
E('m-speed').onclick=e=>{ e.stopPropagation(); speedIdx=(speedIdx+1)%SPEEDS.length; E('m-speed').textContent='文字速度：'+SPEEDS[speedIdx].n; SAVE.settings.speedIdx=speedIdx; flushSave(); };
E('m-font').onclick=e=>{ e.stopPropagation(); const ni=(fontIdx()+1)%FONTS.length; setFontScale(FONTS[ni].v, true); };
E('m-hub').onclick=e=>{ e.stopPropagation(); E('menu').classList.remove('on'); openHub(); };
E('m-hide').onclick=e=>{ e.stopPropagation(); E('menu').classList.remove('on'); setHideUI(true); };
E('m-restart').onclick=e=>{ e.stopPropagation(); E('menu').classList.remove('on'); start(); };
E('m-title').onclick=e=>{ e.stopPropagation(); E('menu').classList.remove('on'); E('log').classList.remove('on');
  setAuto(false); setSkip(false); E('hud').classList.remove('on');
  clearInterval(typeIv); if(autoTimer){clearTimeout(autoTimer); autoTimer=null;} clearStage(); revealing=false; curText=null; node=null;
  E('endcard').style.display='none'; E('title').style.display='flex'; refreshContinue(); };
['log','menu'].forEach(id=>{ E(id).onclick=e=>{ e.stopPropagation(); if(e.target===E(id)) E(id).classList.remove('on'); }; });
E('hub').addEventListener('click',e=>{ if(e.target===E('hub')){ E('hub').classList.remove('on'); E('title').style.display='flex'; refreshContinue(); } });
let _rezT; window.addEventListener('resize', ()=>{ clearTimeout(_rezT); _rezT=setTimeout(refit,160); });
(function preloadAll(){
  try{
    const sp=new Set(), bgs=new Set(), cgs=new Set();
    for(const k in SCENES) for(const s of SCENES[k]){
      if(s&&s.t==='sprite'&&s.key) sp.add(s.key);
      if(s&&s.t==='bg'&&s.bg) bgs.add(s.bg);
      if(s&&s.t==='cg'&&s.cg) cgs.add(s.cg);
    }
    sp.forEach(k=>{ const i=new Image(); i.src='assets/sprites/'+k+'.png'; });
    bgs.forEach(k=>{ const i=new Image(); i.src='assets/bg/'+k+'.jpg'; });
    cgs.forEach(k=>{ const i=new Image(); i.src='assets/cg/'+k+'.jpg'; });
  }catch(_){}
})();
// PWA: オフライン読書のためのサービスワーカー登録（失敗は黙殺）
if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }
</script>
